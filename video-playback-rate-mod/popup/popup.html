
<!doctype html>
<html>
  <head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Playback Speed</title>
	<link rel="stylesheet" href="popup.css" />
  </head>
  <body>
	<div class="container">
	  <h3>🎬 Playback Speed</h3>
	  <div class="controls">
		<label>Speed Control</label>
		<div class="input-row">
		  <input id="rateRange" type="range" min="0.1" max="6" step="0.1" value="1" />
		  <input id="rateInput" type="number" min="0.1" max="6" step="0.1" value="1" />
		  <span style="color: #cbd5e0; font-size: 12px; font-weight: 600;">x</span>
		</div>
	  </div>
	  <div class="buttons">
		<button id="setBtn">Apply Speed</button>
		<button id="incBtn">⬆ +0.25</button>
		<button id="decBtn">⬇ -0.25</button>
		<button id="resetBtn">↻ Reset</button>
	  </div>
	  <div id="status" class="status"></div>
	</div>
	<script src="popup.js"></script>
  </body>
</html>
